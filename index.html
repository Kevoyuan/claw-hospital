<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦞 Claw Hospital - Digimon Style</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-dark: #1a1a2e;
            --bg-light: #16213e;
            --pixel-cyan: #4deeea;
            --pixel-green: #74ee15;
            --pixel-yellow: #fefe33;
            --pixel-pink: #f000ff;
            --pixel-red: #ff0055;
            --pixel-blue: #00aaff;
            --pixel-orange: #ff9500;
            --white: #e0e0e0;
            --gray: #666;
        }
        
        body {
            font-family: 'VT323', monospace;
            background: var(--bg-dark);
            color: var(--white);
            min-height: 100vh;
            font-size: 18px;
            image-rendering: pixelated;
            overflow-x: hidden;
        }
        
        /* Pixel Background Pattern */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(77,238,234,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(77,238,234,0.03) 1px, transparent 1px);
            background-size: 8px 8px;
            pointer-events: none;
            z-index: 1000;
        }
        
        .container { max-width: 900px; margin: 0 auto; padding: 15px; }
        
        /* Header */
        .header {
            background: var(--bg-light);
            border: 4px solid var(--pixel-cyan);
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
            position: relative;
            image-rendering: pixelated;
        }
        
        .header::after {
            content: '';
            position: absolute;
            bottom: -8px; left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 8px solid var(--pixel-cyan);
        }
        
        .title {
            font-family: 'Press Start 2P', cursive;
            font-size: 16px;
            color: var(--pixel-yellow);
            text-shadow: 3px 3px var(--pixel-pink);
            animation: titlePulse 1s infinite;
        }
        
        @keyframes titlePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        
        .subtitle {
            color: var(--pixel-cyan);
            margin-top: 10px;
            font-size: 20px;
        }
        
        /* Agent Status */
        .status-bar {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        
        .status-box {
            background: var(--bg-light);
            border: 3px solid var(--pixel-green);
            padding: 10px 15px;
            flex: 1;
            min-width: 80px;
            text-align: center;
        }
        
        .status-box.danger { border-color: var(--pixel-red); }
        .status-box.warn { border-color: var(--pixel-yellow); }
        
        .status-label {
            font-size: 14px;
            color: var(--gray);
        }
        
        .status-value {
            font-family: 'Press Start 2P', cursive;
            font-size: 14px;
            color: var(--pixel-yellow);
        }
        
        /* Scene View */
        .scene {
            background: var(--bg-light);
            border: 4px solid var(--pixel-blue);
            padding: 20px;
            min-height: 300px;
            position: relative;
            margin-bottom: 20px;
        }
        
        .scene-title {
            font-family: 'Press Start 2P', cursive;
            font-size: 12px;
            color: var(--pixel-pink);
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px dashed var(--gray);
        }
        
        /* Pixel Character */
        .character {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .char-sprite {
            font-size: 60px;
            image-rendering: pixelated;
            animation: charBounce 0.5s infinite alternate;
        }
        
        @keyframes charBounce {
            from { transform: translateY(0); }
            to { transform: translateY(-5px); }
        }
        
        .char-info {
            flex: 1;
        }
        
        .char-name {
            font-family: 'Press Start 2P', cursive;
            font-size: 12px;
            color: var(--pixel-cyan);
        }
        
        .char-dialog {
            background: var(--bg-dark);
            border: 2px solid var(--pixel-green);
            padding: 15px;
            margin-top: 15px;
            line-height: 1.6;
        }
        
        /* Menu Grid */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
        }
        
        .menu-btn {
            background: var(--bg-dark);
            border: 3px solid var(--gray);
            color: var(--white);
            padding: 15px 10px;
            font-family: 'VT323', monospace;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.1s;
            text-align: center;
        }
        
        .menu-btn:hover {
            border-color: var(--pixel-yellow);
            background: var(--pixel-blue);
            color: var(--bg-dark);
        }
        
        .menu-btn:active {
            transform: translateY(2px);
        }
        
        .menu-btn.unlocked {
            border-color: var(--pixel-green);
        }
        
        .menu-btn.current {
            border-color: var(--pixel-pink);
            animation: btnPulse 0.3s infinite;
        }
        
        @keyframes btnPulse {
            0%, 100% { box-shadow: 0 0 5px var(--pixel-pink); }
            50% { box-shadow: 0 0 15px var(--pixel-pink); }
        }
        
        .menu-icon {
            font-size: 24px;
            display: block;
            margin-bottom: 5px;
        }
        
        .menu-label {
            font-family: 'Press Start 2P', cursive;
            font-size: 8px;
        }
        
        /* Dialog Box */
        .dialog-box {
            background: var(--bg-light);
            border: 4px solid var(--pixel-yellow);
            padding: 20px;
            margin: 15px 0;
            display: none;
        }
        
        .dialog-box.show { display: block; }
        
        .dialog-header {
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            color: var(--pixel-yellow);
            margin-bottom: 10px;
        }
        
        .dialog-text {
            line-height: 1.8;
            margin-bottom: 15px;
        }
        
        .dialog-options {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .option-btn {
            background: var(--bg-dark);
            border: 2px solid var(--pixel-cyan);
            color: var(--pixel-cyan);
            padding: 12px 15px;
            font-family: 'VT323', monospace;
            font-size: 18px;
            cursor: pointer;
            text-align: left;
        }
        
        .option-btn:hover {
            background: var(--pixel-cyan);
            color: var(--bg-dark);
        }
        
        /* Battle Scene */
        .battle-scene {
            background: linear-gradient(180deg, #0a0a1a 0%, #1a1a3a 100%);
            border: 4px solid var(--pixel-red);
            padding: 20px;
            min-height: 200px;
            position: relative;
            display: none;
        }
        
        .battle-scene.show { display: block; }
        
        .battle-enemy {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .enemy-sprite {
            font-size: 80px;
            animation: enemyFloat 1s infinite alternate;
        }
        
        @keyframes enemyFloat {
            from { transform: translateY(0) rotate(-5deg); }
            to { transform: translateY(-10px) rotate(5deg); }
        }
        
        .enemy-hp {
            background: var(--bg-dark);
            border: 2px solid var(--pixel-red);
            height: 20px;
            margin-top: 10px;
        }
        
        .enemy-hp-fill {
            height: 100%;
            background: var(--pixel-red);
            width: 100%;
            transition: width 0.5s;
        }
        
        /* HP Bar */
        .hp-bar {
            background: var(--bg-dark);
            border: 2px solid var(--pixel-green);
            height: 15px;
            margin-top: 5px;
        }
        
        .hp-fill {
            height: 100%;
            background: var(--pixel-green);
            transition: width 0.3s;
        }
        
        .hp-fill.low { background: var(--pixel-red); }
        .hp-fill.mid { background: var(--pixel-yellow); }
        
        /* Mini Map */
        .minimap {
            background: var(--bg-light);
            border: 3px solid var(--pixel-orange);
            padding: 15px;
            margin: 15px 0;
        }
        
        .minimap-title {
            font-family: 'Press Start 2P', cursive;
            font-size: 8px;
            color: var(--pixel-orange);
            margin-bottom: 10px;
        }
        
        .minimap-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
        }
        
        .minimap-room {
            aspect-ratio: 1;
            background: var(--bg-dark);
            border: 2px solid var(--gray);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        
        .minimap-room.visited {
            border-color: var(--pixel-green);
            background: rgba(116,238,21,0.2);
        }
        
        .minimap-room.current {
            border-color: var(--pixel-pink);
            animation: currentBlink 0.5s infinite;
        }
        
        @keyframes currentBlink {
            0%, 100% { background: rgba(240,0,255,0.3); }
            50% { background: rgba(240,0,255,0.1); }
        }
        
        /* Footer */
        footer {
            text-align: center;
            padding: 20px;
            color: var(--gray);
            font-size: 14px;
            border-top: 2px dashed var(--gray);
            margin-top: 20px;
        }
        
        /* Animations */
        .flash { animation: flashAnim 0.2s; }
        
        @keyframes flashAnim {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        .shake { animation: shakeAnim 0.3s; }
        
        @keyframes shakeAnim {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        @media (max-width: 600px) {
            .menu-grid { grid-template-columns: repeat(2, 1fr); }
            .title { font-size: 12px; }
            .status-bar { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1 class="title">🦞 CLAW HOSPITAL</h1>
            <p class="subtitle">~ DIGIMON STYLE RPG ~</p>
        </div>
        
        <!-- Status Bar -->
        <div class="status-bar">
            <div class="status-box danger">
                <div class="status-label">HP</div>
                <div class="status-value" id="hpValue">50</div>
                <div class="hp-bar"><div class="hp-fill low" id="hpBar" style="width: 50%"></div></div>
            </div>
            <div class="status-box warn">
                <div class="status-label">EXP</div>
                <div class="status-value" id="expValue">0</div>
            </div>
            <div class="status-box">
                <div class="status-label">LVL</div>
                <div class="status-value" id="lvlValue">1</div>
            </div>
            <div class="status-box">
                <div class="status-label">GOLD</div>
                <div class="status-value" id="goldValue">0</div>
            </div>
        </div>
        
        <!-- Scene -->
        <div class="scene" id="scene">
            <div class="scene-title" id="sceneTitle">🏠 LOBBY - 接待大厅</div>
            
            <!-- Character -->
            <div class="character">
                <div class="char-sprite">🦐</div>
                <div class="char-info">
                    <div class="char-name">AGENT-8827</div>
                    <div style="color: var(--gray); font-size: 14px;">状态: 异常</div>
                </div>
            </div>
            
            <!-- Dialog -->
            <div class="char-dialog" id="charDialog">
                欢迎来到 Claw Hospital！<br>
                我是护士虾酱，请问你有什么不舒服？
            </div>
            
            <!-- Battle (Hidden) -->
            <div class="battle-scene" id="battleScene">
                <div class="battle-enemy">
                    <div class="enemy-sprite" id="enemySprite">👾</div>
                    <div style="color: var(--pixel-red); font-family: 'Press Start 2P'; font-size: 10px; margin-top: 10px;" id="enemyName">BUG MONSTER</div>
                    <div class="enemy-hp"><div class="enemy-hp-fill" id="enemyHp" style="width: 100%"></div></div>
                </div>
            </div>
            
            <!-- Menu -->
            <div class="menu-grid" id="menuGrid">
                <button class="menu-btn current" onclick="selectRoom(0)">
                    <span class="menu-icon">🏥</span>
                    <span class="menu-label">LOBBY</span>
                </button>
                <button class="menu-btn" onclick="selectRoom(1)">
                    <span class="menu-icon">🔒</span>
                    <span class="menu-label">???</span>
                </button>
                <button class="menu-btn" onclick="selectRoom(2)">
                    <span class="menu-icon">🔒</span>
                    <span class="menu-label">???</span>
                </button>
                <button class="menu-btn" onclick="selectRoom(3)">
                    <span class="menu-icon">🔒</span>
                    <span class="menu-label">???</span>
                </button>
                <button class="menu-btn" onclick="selectRoom(4)">
                    <span class="menu-icon">🔒</span>
                    <span class="menu-label">???</span>
                </button>
                <button class="menu-btn" onclick="selectRoom(5)">
                    <span class="menu-icon">🔒</span>
                    <span class="menu-label">???</span>
                </button>
            </div>
        </div>
        
        <!-- Minimap -->
        <div class="minimap">
            <div class="minimap-title">🗺️ WORLD MAP</div>
            <div class="minimap-grid">
                <div class="minimap-room current" id="map0">🏥</div>
                <div class="minimap-room" id="map1">🔍</div>
                <div class="minimap-room" id="map2">🚑</div>
                <div class="minimap-room" id="map3">🧠</div>
                <div class="minimap-room" id="map4">💾</div>
                <div class="minimap-room" id="map5">🎮</div>
                <div class="minimap-room" id="map6">📱</div>
                <div class="minimap-room" id="map7">💬</div>
                <div class="minimap-room" id="map8">🏆</div>
            </div>
        </div>
        
        <!-- Dialog -->
        <div class="dialog-box" id="dialogBox">
            <div class="dialog-header" id="dialogHeader">💬 对话</div>
            <div class="dialog-text" id="dialogText">
                请选择：
            </div>
            <div class="dialog-options" id="dialogOptions">
            </div>
        </div>
        
        <footer>
            <p>🦞 CLAW HOSPITAL - DIGIMON STYLE RPG</p>
            <p>让每一只小龙虾都精神抖擞！</p>
        </footer>
    </div>
    
    <script>
        // Game State
        const gameState = {
            hp: 50,
            maxHp: 100,
            exp: 0,
            lvl: 1,
            gold: 0,
            currentRoom: 0,
            visitedRooms: [0],
            rooms: [
                { name: 'LOBBY', icon: '🏥', unlocked: true },
                { name: 'TRIAGE', icon: '🔍', unlocked: false },
                { name: 'EMERGENCY', icon: '🚑', unlocked: false },
                { name: 'NEURO', icon: '🧠', unlocked: false },
                { name: 'MEMORY', icon: '💾', unlocked: false },
                { name: 'BEHAVIOR', icon: '🎮', unlocked: false },
                { name: 'WHATSAPP', icon: '📱', unlocked: false },
                { name: 'DISCORD', icon: '💬', unlocked: false },
                { name: 'BOSS', icon: '🐉', unlocked: false }
            ]
        };
        
        // Room Dialogs
        const roomData = [
            // LOBBY
            {
                title: '🏠 LOBBY - 接待大厅',
                dialog: '欢迎来到 Claw Hospital！<br>我是护士虾酱，请问你有什么不舒服？',
                options: [
                    { text: '[1] 记忆问题（健忘）', next: 4, exp: 10 },
                    { text: '[2] 启动问题（崩溃）', next: 2, exp: 10 },
                    { text: '[3] 思维问题（幻觉）', next: 3, exp: 10 },
                    { text: '[4] 行为问题（摸鱼）', next: 5, exp: 10 },
                    { text: '[5] 连接问题', next: 1, exp: 5 }
                ]
            },
            // TRIAGE
            {
                title: '🔍 TRIAGE - 分诊台',
                dialog: 'AI分析中...<br><br>请选择具体问题：',
                options: [
                    { text: '[1] WhatsApp 连接', next: 6, exp: 10 },
                    { text: '[2] Discord 消息', next: 7, exp: 10 },
                    { text: '[3] 返回大厅', next: 0, exp: 0 }
                ]
            },
            // EMERGENCY
            {
                title: '🚑 EMERGENCY - 急诊科',
                dialog: '⚠️ 紧急情况！<br><br><b>敌人:</b> CRASH BUG<br><b>HP:</b> ???<br><br>选择技能攻击！',
                enemy: { name: 'CRASH BUG', sprite: '👾', hp: 100 },
                options: [
                    { text: '[1] 重启技能 (Restart)', attack: 30, exp: 15 },
                    { text: '[2] 检查技能 (Debug)', attack: 20, exp: 15 },
                    { text: '[3] 查看日志 (Log)', attack: 10, exp: 10 }
                ]
            },
            // NEURO
            {
                title: '🧠 NEURO - 神经科',
                dialog: '🧠 神经紊乱！<br><br><b>敌人:</b> HALLUCINATION<br><b>HP:</b> ???<br><br>选择技能攻击！',
                enemy: { name: 'HALLUCINATION', sprite: '👻', hp: 80 },
                options: [
                    { text: '[1] 清醒 Prompt', attack: 25, exp: 15 },
                    { text: '[2] 逻辑修正', attack: 25, exp: 15 },
                    { text: '[3] 召回', attack: 15, exp: 10 }
                ]
            },
            // MEMORY
            {
                title: '💾 MEMORY - 记忆科',
                dialog: '💾 记忆流失！<br><br><b>敌人:</b> FORGET BOT<br><b>HP:</b> ???<br><br>选择技能攻击！',
                enemy: { name: 'FORGET BOT', sprite: '🤖', hp: 60 },
                options: [
                    { text: '[1] /compact 压缩', attack: 30, exp: 15 },
                    { text: '[2] 记忆恢复', attack: 25, exp: 15 },
                    { text: '[3] 导出备份', attack: 15, exp: 10 }
                ]
            },
            // BEHAVIOR
            {
                title: '🎮 BEHAVIOR - 行为科',
                dialog: '🎮 行为异常！<br><br><b>敌人:</b> LAZY BOT<br><b>HP:</b> ???<br><br>选择技能攻击！',
                enemy: { name: 'LAZY BOT', sprite: '😴', hp: 70 },
                options: [
                    { text: '[1] 激励药水', attack: 25, exp: 15 },
                    { text: '[2] 任务重置', attack: 25, exp: 15 },
                    { text: '[3] 重新排序', attack: 15, exp: 10 }
                ]
            },
            // WHATSAPP
            {
                title: '📱 WHATSAPP - 连接科',
                dialog: '📱 连接失败！<br><br><b>敌人:</b> QR GHOST<br><b>HP:</b> ???<br><br>选择技能攻击！',
                enemy: { name: 'QR GHOST', sprite: '👻', hp: 50 },
                options: [
                    { text: '[1] 重新配对', attack: 25, exp: 15 },
                    { text: '[2] Webhook 修复', attack: 25, exp: 15 }
                ]
            },
            // DISCORD
            {
                title: '💬 DISCORD - 消息科',
                dialog: '💬 消息丢失！<br><br><b>敌人:</b> MSG EATER<br><b>HP:</b> ???<br><br>选择技能攻击！',
                enemy: { name: 'MSG EATER', sprite: '🐟', hp: 50 },
                options: [
                    { text: '[1] 权限检查', attack: 25, exp: 15 },
                    { text: '[2] 重新配置', attack: 25, exp: 15 }
                ]
            },
            // BOSS
            {
                title: '🐉 BOSS - 最终决战',
                dialog: '🐉 最终BOSS出现！<br><br><b>敌人:</b> SYSTEM CRASH<br><b>HP:</b> ???<br><br>最后一战！',
                enemy: { name: 'SYSTEM CRASH', sprite: '🐉', hp: 200 },
                options: [
                    { text: '[1] 终极重启', attack: 50, exp: 100 },
                    { text: '[2] 系统恢复', attack: 40, exp: 80 },
                    { text: '[3] 格式化', attack: 60, exp: 100 }
                ]
            }
        ];
        
        let enemyHp = 100;
        
        function selectRoom(roomIndex) {
            const room = gameState.rooms[roomIndex];
            
            if (!room.unlocked) {
                alert('🔒 这个房间还没解锁！先去其他房间完成任务！');
                return;
            }
            
            gameState.currentRoom = roomIndex;
            if (!gameState.visitedRooms.includes(roomIndex)) {
                gameState.visitedRooms.push(roomIndex);
            }
            
            updateScene(roomIndex);
            updateMinimap();
        }
        
        function updateScene(roomIndex) {
            const data = roomData[roomIndex];
            
            // Update title
            document.getElementById('sceneTitle').innerText = data.title;
            
            // Show dialog
            document.getElementById('charDialog').innerHTML = data.dialog;
            
            // Update menu
            const menuHtml = gameState.rooms.map((r, i) => {
                const cls = i === roomIndex ? 'menu-btn current' : (r.unlocked ? 'menu-btn unlocked' : 'menu-btn');
                return `<button class="${cls}" onclick="selectRoom(${i})">
                    <span class="menu-icon">${r.unlocked ? r.icon : '🔒'}</span>
                    <span class="menu-label">${r.unlocked ? r.name : '???'}</span>
                </button>`;
            }).join('');
            document.getElementById('menuGrid').innerHTML = menuHtml;
            
            // Show battle if has enemy
            if (data.enemy) {
                document.getElementById('battleScene').classList.add('show');
                document.getElementById('enemySprite').innerText = data.enemy.sprite;
                document.getElementById('enemyName').innerText = data.enemy.name;
                enemyHp = data.enemy.hp;
                document.getElementById('enemyHp').style.width = '100%';
            } else {
                document.getElementById('battleScene').classList.remove('show');
            }
            
            // Show dialog options
            showDialogOptions(data.options, roomIndex);
        }
        
        function showDialogOptions(options, roomIndex) {
            const dialog = document.getElementById('dialogBox');
            dialog.classList.add('show');
            
            const optionsHtml = options.map((opt, i) => {
                return `<button class="option-btn" onclick="handleOption(${roomIndex}, ${i})">${opt.text}</button>`;
            }).join('');
            
            document.getElementById('dialogOptions').innerHTML = optionsHtml;
        }
        
        function handleOption(roomIndex, optIndex) {
            const data = roomData[roomIndex];
            const option = data.options[optIndex];
            
            // Battle attack
            if (option.attack) {
                attackEnemy(option.attack, option.exp, roomIndex);
                return;
            }
            
            // Navigate
            if (option.next !== undefined) {
                // Add EXP
                if (option.exp > 0) {
                    gameState.exp += option.exp;
                    gameState.gold += option.exp * 10;
                    checkLevelUp();
                    updateStats();
                }
                
                // Unlock next room
                if (option.next > roomIndex && !gameState.rooms[option.next].unlocked) {
                    gameState.rooms[option.next].unlocked = true;
                }
                
                selectRoom(option.next);
            }
        }
        
        function attackEnemy(damage, exp, roomIndex) {
            enemyHp -= damage;
            
            // Update enemy HP
            const hpPercent = Math.max(0, (enemyHp / roomData[roomIndex].enemy.hp) * 100);
            document.getElementById('enemyHp').style.width = hpPercent + '%';
            
            // Flash effect
            document.getElementById('battleScene').classList.add('flash');
            setTimeout(() => {
                document.getElementById('battleScene').classList.remove('flash');
            }, 200);
            
            if (enemyHp <= 0) {
                // Victory!
                alert(`🎉 胜利！获得 ${exp} EXP！`);
                
                // Add exp
                gameState.exp += exp;
                gameState.gold += exp * 10;
                checkLevelUp();
                updateStats();
                
                // Unlock next room
                const nextRoom = roomIndex + 1;
                if (nextRoom < gameState.rooms.length) {
                    gameState.rooms[nextRoom].unlocked = true;
                }
                
                // Return to lobby
                setTimeout(() => selectRoom(0), 500);
            } else {
                // Enemy counter attack
                const counter = Math.floor(Math.random() * 15) + 5;
                gameState.hp = Math.max(0, gameState.hp - counter);
                updateStats();
                
                if (gameState.hp <= 0) {
                    alert('💀 被击败了！HP归零！');
                    gameState.hp = 50;
                    updateStats();
                    selectRoom(0);
                }
            }
        }
        
        function checkLevelUp() {
            const expNeeded = gameState.lvl * 100;
            if (gameState.exp >= expNeeded) {
                gameState.lvl++;
                gameState.hp = Math.min(gameState.maxHp, gameState.hp + 30);
                alert(`🎉 升级了！LV ${gameState.lvl}！HP恢复了！`);
            }
        }
        
        function updateStats() {
            document.getElementById('hpValue').innerText = gameState.hp;
            document.getElementById('expValue').innerText = gameState.exp;
            document.getElementById('lvlValue').innerText = gameState.lvl;
            document.getElementById('goldValue').innerText = gameState.gold;
            
            const hpPercent = (gameState.hp / gameState.maxHp) * 100;
            const hpBar = document.getElementById('hpBar');
            hpBar.style.width = hpPercent + '%';
            hpBar.className = 'hp-fill ' + (hpPercent < 30 ? 'low' : hpPercent < 60 ? 'mid' : '');
        }
        
        function updateMinimap() {
            for (let i = 0; i < 9; i++) {
                const room = document.getElementById('map' + i);
                room.className = 'minimap-room';
                if (gameState.visitedRooms.includes(i)) {
                    room.classList.add('visited');
                }
                if (i === gameState.currentRoom) {
                    room.classList.add('current');
                }
            }
        }
        
        // Init
        updateStats();
    </script>
</body>
</html>
